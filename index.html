<title>Ten Principles</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {

  color: #e0e0e0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Header */
header {
  padding: 80px 0 40px;
  text-align: center;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #4a9eff, transparent);
}

h1 {

  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.5px;
  margin-bottom: 24px;
  line-height: 1.3;
}

.subtitle {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: #888;
  margin-bottom: 8px;
}

.subtitle .word {
  color: #4a9eff;
  opacity: 0.85;
  transition: opacity 0.3s;
}

.subtitle .word:hover {
  opacity: 1;
}

.subtitle .dot {
  color: #555;
}

/* Tagline */
.tagline {
  padding: 32px 0 48px;
  text-align: center;
}

.tagline p {
  font-size: clamp(0.85rem, 2vw, 1rem);
  color: #999;
  font-style: italic;
  max-width: 600px;
  margin: 0 auto;
}

/* Principles */
.principles {
  padding-bottom: 60px;
}

.principle-card {
  background: #12121a;
  border: 1px solid #1e1e2e;
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.principle-card:hover {
  border-color: #2a2a3e;
  box-shadow: 0 0 20px rgba(74, 158, 255, 0.04);
}

.principle-card.active {
  border-color: #4a9eff33;
  box-shadow: 0 0 30px rgba(74, 158, 255, 0.06);
}

.principle-header {
  padding: 20px 24px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  user-select: none;
  position: relative;
}

.principle-header:hover {
  background: #14141e;
}

.principle-number {
  font-size: 0.8rem;
  color: #555;
  font-weight: 600;
  min-width: 24px;
  padding-top: 2px;
}

.principle-info {
  flex: 1;
}

.principle-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: #4a9eff;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.principle-summary {
  font-size: 0.85rem;
  color: #888;
  line-height: 1.7;
}

.principle-toggle {
  color: #555;
  font-size: 1.2rem;
  min-width: 20px;
  text-align: center;
  padding-top: 2px;
  transition: transform 0.3s, color 0.3s;
}

.principle-card.active .principle-toggle {
  transform: rotate(45deg);
  color: #4a9eff;
}

.principle-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.principle-body-inner {
  padding: 0 24px 28px;
  padding-left: 64px;
}

.principle-body-inner p {
  font-size: 0.9rem;
  color: #c8c8d0;
  line-height: 1.85;
  margin-bottom: 16px;
}

.principle-body-inner p:last-child {
  margin-bottom: 0;
}

/* Footer */
footer {
  padding: 48px 0;
  text-align: center;
  border-top: 1px solid #1a1a2a;
}

footer p {
  font-size: 0.75rem;
  color: #444;
}

/* Glow accent at top */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(74, 158, 255, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}

/* Responsive */
@media (max-width: 600px) {
  header {
    padding: 48px 0 32px;
  }
  .principle-header {
    padding: 16px 16px;
    gap: 12px;
  }
  .principle-body-inner {
    padding-left: 52px;
    padding-right: 16px;
  }
  .container {
    padding: 0 16px;
  }
}
</style>
</head>

  <footer>
    <p>Ten Principles</p>
  </footer>

const container = document.getElementById('principles');
let activeIndex = -1;

principles.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'principle-card';
  card.id = 'principle-' + i;

  const essayHtml = p.essay.map(para => '<p>' + para + '</p>').join('');

  card.innerHTML =
    '<div class="principle-header" onclick="toggle(' + i + ')">' +
      '<span class="principle-number">' + String(p.number).padStart(2, '0') + '</span>' +
      '<div class="principle-info">' +
        '<div class="principle-name">' + p.name + '</div>' +
        '<div class="principle-summary">' + p.summary + '</div>' +
      '</div>' +
      '<span class="principle-toggle">+</span>' +
    '</div>' +
    '<div class="principle-body">' +
      '<div class="principle-body-inner">' + essayHtml + '</div>' +
    '</div>';

  container.appendChild(card);
});

function toggle(index) {
  const cards = document.querySelectorAll('.principle-card');

  if (activeIndex === index) {
    // Collapse current
    const card = cards[index];
    const body = card.querySelector('.principle-body');
    card.classList.remove('active');
    body.style.maxHeight = '0';
    activeIndex = -1;
    return;
  }

  // Collapse previous
  if (activeIndex !== -1) {
    const prev = cards[activeIndex];
    const prevBody = prev.querySelector('.principle-body');
    prev.classList.remove('active');
    prevBody.style.maxHeight = '0';
  }

  // Expand new
  const card = cards[index];
  const body = card.querySelector('.principle-body');
  card.classList.add('active');
  body.style.maxHeight = body.scrollHeight + 'px';
  activeIndex = index;

  // Scroll into view after a brief delay for animation
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}
</script>
